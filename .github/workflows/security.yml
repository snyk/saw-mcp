name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  snyk-open-source:
    name: Snyk Open Source (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install setuptools wheel && pip install -e .
      - name: Run Snyk Open Source scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk Code scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

  secrets-scan:
    name: Secret Detection
    # Reusable workflow from snyk-prodsec; will pass once repo moves to snyk org.
    # Falls back to standalone Gitleaks in the meantime.
    uses: probely/snyk-prodsec/.github/workflows/secrets-scanning.yml@main
    continue-on-error: true
    with:
      channel: probely-alerts
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_SECRET }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  secrets-scan-fallback:
    name: Secret Detection (fallback)
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}